<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>七牛云图床</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%236366f1'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%230f172a'/%3E%3Cpath d='M20 42c-4 0-7-3-7-7s3-7 7-7c0-5 4-9 9-9 4 0 8 3 9 7h1c4 0 7 3 7 7s-3 7-7 7z' fill='url(%23g)'/%3E%3Cpath d='M28 38v-6l6 3z' fill='%230f172a'/%3E%3C/svg%3E">
<script src="static/sweetalert2.all.min.js"></script>
<script src="static/axios.min.js"></script>
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--card:rgba(30,41,59,.8);--card-h:rgba(51,65,85,.8);--input:rgba(15,23,42,.6);--brd:rgba(148,163,184,.15);--brd-f:rgba(99,102,241,.5);--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--ac:#6366f1;--ac-h:#818cf8;--dg:#ef4444;--dg-h:#f87171;--ok:#22c55e;--ok-h:#4ade80;--inf:#0ea5e9;--inf-h:#38bdf8;--wrn:#f59e0b;--r:12px;--rs:8px;--tr:.2s ease}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0;transition:opacity .6s ease;z-index:-1}
body.has-bg::before{opacity:.08}
.app{display:flex;height:100vh;gap:16px;padding:16px}
.panel{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--brd);border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden}
.ph{padding:20px 24px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ph h2{font-size:16px;font-weight:600;color:var(--t1)}
.pb{padding:20px 24px;flex:1;overflow-y:auto}
.pb::-webkit-scrollbar{width:6px}
.pb::-webkit-scrollbar-track{background:transparent}
.pb::-webkit-scrollbar-thumb{background:var(--t3);border-radius:3px}
.p-up{width:320px;flex-shrink:0}
.ig{margin-bottom:12px}
.ig label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.if{width:100%;padding:10px 14px;background:var(--input);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);font-size:14px;outline:none;transition:border-color var(--tr)}
.if:focus{border-color:var(--brd-f)}
.if::placeholder{color:var(--t3)}
#file{display:none}
.dz{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed var(--brd);border-radius:var(--r);cursor:pointer;transition:all var(--tr);min-height:180px;margin:12px 0}
.dz:hover,.dz.dragover{border-color:var(--ac);background:rgba(99,102,241,.05)}
.dz-i{font-size:40px;margin-bottom:12px;opacity:.6}
.dz-t{font-size:14px;color:var(--t2)}
.dz-h{font-size:12px;color:var(--t3);margin-top:6px}
.br{display:flex;gap:8px}
.b{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border:none;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--tr);outline:none;white-space:nowrap}
.b:active{transform:scale(.97)}
.b-p{background:var(--ac);color:#fff}.b-p:hover{background:var(--ac-h)}
.b-d{background:var(--dg);color:#fff}.b-d:hover{background:var(--dg-h)}
.b-s{background:var(--ok);color:#fff}.b-s:hover{background:var(--ok-h)}
.b-i{background:var(--inf);color:#fff}.b-i:hover{background:var(--inf-h)}
.b-g{background:var(--input);color:var(--t2);border:1px solid var(--brd)}.b-g:hover{background:var(--card-h);color:var(--t1)}
.b-sm{padding:7px 12px;font-size:12px}
.p-li{flex:1;min-width:280px}
.fi{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--rs);cursor:pointer;transition:background var(--tr);margin-bottom:2px}
.fi:hover{background:var(--card-h)}
.fi.act{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3)}
.fi-i{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.fi-i.fd{color:var(--wrn)}.fi-i.fl{color:var(--inf)}
.fi-n{font-size:14px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi-m{font-size:11px;color:var(--t3);margin-top:2px}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3)}
.es-i{font-size:48px;margin-bottom:16px;opacity:.4}
.es-t{font-size:14px}
.p-pv{width:400px;flex-shrink:0}
.pvc{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.pvi{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--rs);display:none}
.pvi.on{display:block}
.pvp{text-align:center;color:var(--t3)}
.pvp-i{font-size:56px;margin-bottom:12px;opacity:.3}
.pvp-t{font-size:14px}
.fib{padding:12px 24px;border-top:1px solid var(--brd);background:rgba(0,0,0,.2);display:none;flex-shrink:0}
.fib.vis{display:block}
.fir{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
.fil{color:var(--t3)}.fiv{color:var(--t2)}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-m{background:rgba(100,116,139,.2);color:var(--t2)}
.hb{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--input);border:1px solid var(--brd);color:var(--t2);font-size:14px;cursor:pointer;transition:all var(--tr)}
.hb:hover{background:var(--card-h);color:var(--t1)}
.swal2-popup{background:var(--bg2)!important;color:var(--t1)!important;border:1px solid var(--brd)!important;border-radius:var(--r)!important}
.swal2-title{color:var(--t1)!important}.swal2-html-container{color:var(--t2)!important}
.swal2-input{background:var(--input)!important;color:var(--t1)!important;border:1px solid var(--brd)!important}
.swal2-confirm{background:var(--ac)!important;border-radius:var(--rs)!important}
.swal2-cancel{background:var(--input)!important;color:var(--t2)!important;border-radius:var(--rs)!important}
.help-popup{font-size:15px!important}
.help-popup a{color:var(--ac)}
.help-popup code{background:var(--input);padding:2px 6px;border-radius:4px;font-size:13px}
.help-popup ul{padding-left:20px}.help-popup li{margin-bottom:6px}
@media(max-width:900px){.app{flex-direction:column;overflow-y:auto}.p-up,.p-pv{width:100%}.p-up{height:auto}.p-pv{min-height:300px}body{overflow:auto}}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out}
.lb.on{display:flex}
.lb img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:var(--rs);box-shadow:0 0 40px rgba(0,0,0,.5)}
.lb-x{position:absolute;top:20px;right:24px;font-size:28px;color:#fff;cursor:pointer;opacity:.7;transition:opacity .2s}
.lb-x:hover{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="panel p-up">
    <div class="ph"><h2>上传文件</h2><span class="badge badge-m" id="status-badge">就绪</span></div>
    <div class="pb" style="display:flex;flex-direction:column">
      <div class="ig"><label>文件名 / URL</label><input class="if ipt" type="text" id="mkdir" placeholder="输入 URL 或选中文件后显示文件名"></div>
      <div class="br" style="margin-bottom:12px">
        <button class="b b-i b-sm" type="button" onclick="uploadurl();" style="flex:1">URL 上传</button>
        <button class="b b-d b-sm" type="button" onclick="remove();" style="flex:1">删除文件</button>
      </div>
      <input type="file" name="file" id="file"/>
      <div id="drop-area" class="dz">
        <div class="dz-i">📁</div>
        <div class="dz-t">点击、拖入或粘贴上传</div>
        <div class="dz-h">支持图片、文档等任意文件</div>
      </div>
    </div>
  </div>
  <div class="panel p-li">
    <div class="ph">
      <h2 id="head">文件列表</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="b b-g b-sm" type="button" id="back" onclick="list();">刷新列表</button>
        <button class="hb" onclick="showHelp();" title="帮助">?</button>
      </div>
    </div>
    <div class="pb" id="div">
      <div class="es" id="empty-state"><div class="es-i">📂</div><div class="es-t">点击「刷新列表」查看文件</div></div>
    </div>
  </div>
  <div class="panel p-pv">
    <div class="ph">
      <h2>预览</h2>
      <div style="display:flex;gap:8px">
        <button class="b b-s b-sm" type="button" id="link" onclick="window.open(imageUrl,'_blank');">打开链接</button>
        <button class="b b-i b-sm" type="button" id="copyurl" onclick="copyCurrentUrl();">复制链接</button>
      </div>
    </div>
    <div class="pvc">
      <img id="image-display" class="pvi" src="" alt="预览" ondblclick="openLightbox()"/>
      <div class="pvp" id="preview-placeholder"><div class="pvp-i">🖼️</div><div class="pvp-t">选择文件以预览</div></div>
    </div>
    <div class="fib" id="file-info-panel">
      <div class="fir"><span class="fil">文件名</span><span class="fiv" id="info-filename"></span></div>
      <div class="fir"><span class="fil">大小</span><span class="fiv" id="info-filesize"></span></div>
      <div class="fir"><span class="fil">上传时间</span><span class="fiv" id="info-createtime"></span></div>
    </div>
  </div>
</div>
<script>
let imageUrl="",lurl="",lists=[];
var way="",domain="",listVisible=false,activeIndex=-1,nextMarker="",hasNext=false;
axios.defaults.headers.common['Authorization']='Bearer your_token';

axios.get("/api/info").then(function(r){
    way=r.data['data']['path'];
    domain=r.data['data']['domain'];
    document.getElementById("head").innerText="文件列表 /"+way;
    document.getElementById('mkdir').value="登录成功";
}).catch(function(e){
    if(e.response&&e.response.status===401){
        Swal.fire({title:"请输入密码",input:'password',showCancelButton:false,confirmButtonText:'确认',
            inputAttributes:{autocapitalize:'off'},showLoaderOnConfirm:true,
            preConfirm:function(pw){
                axios.defaults.headers.common['Authorization']=pw;
                return axios.get("/api/info").then(function(r){
                    way=r.data['data']['path'];domain=r.data['data']['domain'];
                    document.getElementById("head").innerText="文件列表 /"+way;
                    document.getElementById('mkdir').value="登录成功";
                }).catch(function(e2){
                    if(e2.response.status===401){errorMsg("密码错误","请刷新页面再次输入");setTimeout(function(){location.reload();},2000);}
                    else if(e2.response.status===403){warningMsg("操作频繁","密码错误频繁，请稍后再试");setTimeout(function(){location.reload();},2000);}
                    else{errorMsg("请求出错","请求出错");}
                });
            },allowOutsideClick:function(){return !Swal.isLoading()}
        });
    }else{errorMsg("请求出错","请求出错");}
});

function list(){
    var div=document.getElementById("div");
    nextMarker="";hasNext=false;lists=[];listVisible=true;
    div.innerHTML='';
    loadMore();
}
window.list=list;

function loadMore(){
    var div=document.getElementById("div");
    var loadBtn=document.getElementById("load-more-btn");
    if(loadBtn)loadBtn.remove();
    axios.post("/api/list",{path:way,marker:nextMarker,limit:50}).then(function(r){
        var d=r.data['data'];
        var arr=d['list']||[];
        hasNext=d['has_next'];nextMarker=d['next_marker']||"";
        for(var i=0;i<arr.length;i++){
            if(arr[i].key.indexOf("link")!=-1)continue;
            var idx=lists.length;
            lists.push(arr[i]);
            var el=document.createElement("div");
            el.className="fi";
            var isFolder=(arr[i].key.indexOf(".")==-1);
            el.innerHTML='<span class="fi-i '+(isFolder?'fd':'fl')+'">'+(isFolder?'📁':'📄')+'</span><div><div class="fi-n">'+arr[i].key+'</div><div class="fi-m">'+formatBytes(arr[i].fsize)+' · '+formatQiniuTime(arr[i].putTime)+'</div></div>';
            (function(ii){el.addEventListener("click",function(){showImage(ii);});})(idx);
            div.appendChild(el);
        }
        if(lists.length===0){
            div.innerHTML='<div class="es"><div class="es-i">📭</div><div class="es-t">目录为空</div></div>';
            return;
        }
        if(hasNext){
            var btn=document.createElement("button");
            btn.id="load-more-btn";btn.className="b b-g b-sm";btn.style.cssText="width:100%;margin-top:12px";
            btn.innerText="加载更多";btn.onclick=loadMore;
            div.appendChild(btn);
        }
    }).catch(function(e){
        if(e.response&&e.response.status===400)errorMsg("请求失败",e.response.data.data);
        else errorMsg("请求出错","请求出错");
    });
}

function showImage(index){
    var info=lists[index];if(!info)return;
    activeIndex=index;
    var items=document.querySelectorAll('.fi');
    items.forEach(function(el,i){el.classList.toggle('act',i===index);});
    imageUrl=domain+"/"+way+"/"+info.key;
    lurl=info.key;
    document.getElementById('mkdir').value=lurl;
    var img=document.getElementById('image-display');
    img.src=imageUrl;img.classList.add('on');
    document.getElementById('preview-placeholder').style.display='none';
    document.getElementById('info-filename').innerText=info.key;
    document.getElementById('info-filesize').innerText=formatBytes(info.fsize);
    document.getElementById('info-createtime').innerText=formatQiniuTime(info.putTime);
    document.getElementById('file-info-panel').classList.add('vis');
    document.body.style.setProperty('--bg-img','url('+imageUrl+')');
    document.body.classList.add('has-bg');
    document.body.style.backgroundImage='url('+imageUrl+')';
    document.body.style.backgroundSize='cover';
    document.body.style.backgroundPosition='center';
    document.body.style.backgroundRepeat='no-repeat';
    document.body.style.backgroundAttachment='fixed';
}

function copyCurrentUrl(){
    if(!imageUrl){warningMsg('未选择文件','请先在列表中选择文件');return;}
    setClipboard(imageUrl);
}

function showHelp(){
    Swal.fire({title:'使用帮助',html:'<div style="text-align:left;line-height:1.6"><p><strong>项目简介：</strong>七牛云图床在线管理与预览。</p><p><strong>基本用法：</strong></p><ul style="padding-left:18px"><li>首次访问如需密码，按提示输入。</li><li>点击「刷新列表」展开/收起文件列表。</li><li>点击文件名可在右侧预览。</li><li>「打开链接」在新窗口打开预览链接。</li><li>「复制链接」复制完整 URL 到剪贴板。</li><li>左侧支持点击、拖拽、粘贴上传。</li><li>「URL 上传」按输入框 URL 拉取并上传。</li><li>「删除文件」删除输入框指定文件。</li></ul><p><strong>项目地址：</strong><a href="https://github.com/chenxuan520/qiniuserver" target="_blank">GitHub</a></p></div>',
        width:600,customClass:{popup:'help-popup'},confirmButtonText:'知道了'});
}
</script>
<script>
var dropArea=document.getElementById('drop-area');
dropArea.addEventListener('dragover',function(e){e.preventDefault();dropArea.classList.add('dragover');});
dropArea.addEventListener('dragleave',function(){dropArea.classList.remove('dragover');});
dropArea.addEventListener('drop',function(e){
    e.preventDefault();dropArea.classList.remove('dragover');
    var files=e.dataTransfer.files;
    if(files.length>0){uploadFile(files[0]);}
});
document.addEventListener('paste',function(e){
    var items=e.clipboardData.items;
    for(var i=0;i<items.length;i++){
        if(items[i].kind==='file'&&items[i].type.indexOf('image')!==-1){
            var f=items[i].getAsFile();
            uploadFile(new File([f],"pasteboard.paste",{type:f.type}));
            break;
        }
    }
});
var fileInput=document.getElementById('file');
fileInput.addEventListener('change',function(e){if(e.target.files[0])uploadFile(e.target.files[0]);});
dropArea.addEventListener('click',function(){fileInput.click();});

function remove(){
    var sen=document.getElementById("mkdir");
    if(!sen.value){warningMsg("提示","请先选择或输入文件名");return;}
    axios.post("/api/delete",{path:way+"/"+sen.value}).then(function(){
        successMsg("删除成功",sen.value+" 已删除");
        list();list();
        sen.value="";activeIndex=-1;
    }).catch(function(e){
        if(e.response&&e.response.status===400)errorMsg("删除失败",e.response.data.data);
        else errorMsg("请求出错","请求出错");
    });
}

function uploadurl(){
    var sen=document.getElementById("mkdir");
    if(!sen.value){warningMsg("提示","请输入 URL");return;}
    var badge=document.getElementById("status-badge");badge.innerText="上传中";badge.style.background="rgba(99,102,241,.2)";
    axios.post("/api/upload_url",{path:sen.value}).then(function(r){
        uploadResultDeal(r.data['data']['url']);
        successMsg("上传成功","URL 文件已上传并复制链接");
        badge.innerText="就绪";badge.style.background="";
        list();list();
    }).catch(function(e){
        badge.innerText="就绪";badge.style.background="";
        if(e.response&&e.response.status===400)errorMsg("上传失败",e.response.data.data);
        else errorMsg("请求出错","请求出错");
    });
}

function uploadFile(file){
    var badge=document.getElementById("status-badge");badge.innerText="上传中";badge.style.background="rgba(99,102,241,.2)";
    var fd=new FormData();fd.append("file",file,file.name);
    axios.post("/api/upload",fd,{headers:{"Content-Type":"multipart/form-data;boundary="+new Date().getTime()}}).then(function(r){
        uploadResultDeal(r.data['data']['url']);
        successMsg("上传成功",file.name+" 已上传并复制链接");
        badge.innerText="就绪";badge.style.background="";
        list();list();
    }).catch(function(e){
        badge.innerText="就绪";badge.style.background="";
        if(e.response&&e.response.status===400)errorMsg("上传失败",e.response.data.data);
        else errorMsg("请求出错","请求出错");
    });
}

function uploadResultDeal(data){
    var parts=data.split('/'),last=parts[parts.length-1];
    document.getElementById("mkdir").value=last;
    setClipboard(data);
}

function setClipboard(t){
    navigator.clipboard.writeText(t).then(function(){
        Swal.fire({title:'链接(已复制到粘贴板)',text:t,icon:'info',showConfirmButton:false,timer:2000});
    }).catch(function(){
        errorMsg("复制失败","链接: "+t);
    });
}

function formatBytes(b,d){
    d=d||2;if(!b||b===0)return '0 B';var k=1024,dm=d<0?0:d;
    var s=['B','KB','MB','GB','TB'];var i=Math.floor(Math.log(b)/Math.log(k));
    return parseFloat((b/Math.pow(k,i)).toFixed(dm))+' '+s[i];
}

function formatQiniuTime(pt){
    if(!pt)return 'N/A';var ts=pt/10000,d=new Date(ts);
    var Y=d.getFullYear()+'-',M=(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-';
    var D=(d.getDate()<10?'0':'')+d.getDate()+' ';
    var h=(d.getHours()<10?'0':'')+d.getHours()+':',m=(d.getMinutes()<10?'0':'')+d.getMinutes()+':';
    var s=(d.getSeconds()<10?'0':'')+d.getSeconds();return Y+M+D+h+m+s;
}

function successMsg(t,m){Swal.fire({title:t,text:m,icon:'success',showConfirmButton:false,timer:2000});}
function warningMsg(t,m){Swal.fire({title:t,text:m,icon:'warning',showConfirmButton:false,timer:2000});}
function errorMsg(t,m){Swal.fire({title:t,text:m,icon:'error',showConfirmButton:false,timer:2000});}
function openLightbox(){if(!imageUrl)return;document.getElementById('lb-img').src=imageUrl;document.getElementById('lightbox').classList.add('on');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('on');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLightbox();});
</script>
<div class="lb" id="lightbox" onclick="closeLightbox()">
  <span class="lb-x">✕</span>
  <img id="lb-img" src="" alt="预览"/>
</div>
</body>
</html>
